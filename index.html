<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"><meta name="theme-color" content="#7ec8e3"><link rel="manifest" href="manifest.webmanifest"><link rel="apple-touch-icon" href="apple-touch-icon.png"><title>サマモン</title></head><body>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: 'Hiragino Maru Gothic ProN', 'BIZ UDPGothic', 'Yu Gothic', 'Meiryo', sans-serif;
    background: linear-gradient(180deg, #7ec8e3 0%, #bfe9f5 45%, #fff3c4 100%) fixed;
    color: #2b3a55;
    -webkit-user-select: none; user-select: none;
  }
  #app { max-width: 480px; margin: 0 auto; min-height: 100vh; padding: 12px 12px 84px; position: relative; }

  .screen { display: none; }
  .screen.active { display: block; }
  .hidden { visibility: hidden; }

  .btn {
    display: inline-block; border: none; border-radius: 12px; padding: 10px 14px;
    font-family: inherit; font-size: 15px; font-weight: bold; color: #2b3a55;
    background: #fff; box-shadow: 0 2px 0 rgba(0,0,0,.15); cursor: pointer; min-height: 44px;
  }
  .btn:active { transform: translateY(2px); box-shadow: none; }
  .btn.primary { background: #ffb340; color: #4a2f00; }
  .btn.boss { background: #7c6bd6; color: #fff; }
  .btn.danger { background: #ef5350; color: #fff; }
  .btn.sub { flex: 1; font-size: 14px; padding: 10px 4px; }
  .btn:disabled { opacity: .4; pointer-events: none; }

  /* ---------- SVGアート共通 ---------- */
  .art { width: 100%; height: 100%; }
  .art svg { width: 100%; height: 100%; display: block; }
  .art.sil svg { filter: brightness(0); opacity: .55; }
  .art.sil .bg { display: none; }  /* シルエットでは背景エフェクトを消す */
  .art-missing { font-size: 32px; text-align: center; line-height: 2; }

  /* ---------- タイトル ---------- */
  #screen-title { text-align: center; padding-top: 24px; }
  .title-sun { font-size: 40px; }
  .title-logo h1 {
    font-size: 52px; letter-spacing: 6px; color: #ff7043; margin: 4px 0;
    text-shadow: 3px 3px 0 #fff, 5px 5px 0 rgba(0,0,0,.12);
  }
  .title-sub { font-size: 14px; color: #38618c; margin-bottom: 20px; }
  .title-box { background: rgba(255,255,255,.88); border-radius: 20px; padding: 18px 14px; }
  .title-box h2 { font-size: 17px; margin-bottom: 14px; }
  #starter-cards { display: flex; gap: 10px; justify-content: center; }
  .starter-card {
    flex: 1; background: #fff; border: 3px solid; border-radius: 16px; padding: 14px 6px;
    cursor: pointer; box-shadow: 0 3px 0 rgba(0,0,0,.12);
  }
  .starter-card:active { transform: translateY(2px); box-shadow: none; }
  .st-art { border-radius: 50%; width: 76px; height: 76px; margin: 0 auto 8px; padding: 6px; overflow: hidden; }
  .st-name { font-weight: bold; font-size: 14px; }
  .st-type { font-size: 12px; font-weight: bold; margin-top: 2px; }

  /* ---------- 共通ヘッダ・カード ---------- */
  .map-header, .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .map-title, .page-title { font-size: 19px; font-weight: bold; color: #1f4e79; }
  .bag-chip {
    border: none; background: #fff; border-radius: 999px; padding: 8px 14px; font-family: inherit;
    font-weight: bold; font-size: 13.5px; box-shadow: 0 2px 0 rgba(0,0,0,.1); cursor: pointer; color: #2b3a55;
  }

  .area-card { background: rgba(255,255,255,.92); border-radius: 16px; padding: 14px; margin-bottom: 10px; box-shadow: 0 2px 6px rgba(0,0,0,.08); }
  .area-card.locked { opacity: .65; }
  .area-head { display: flex; justify-content: space-between; align-items: center; }
  .area-name { font-size: 17px; font-weight: bold; }
  .badge { background: #66bb6a; color: #fff; font-size: 11px; font-weight: bold; border-radius: 999px; padding: 3px 10px; }
  .area-sub { font-size: 12px; color: #607089; margin: 4px 0 10px; }
  .area-lock { font-size: 13px; color: #8a93a5; font-weight: bold; }
  .area-btns { display: flex; gap: 8px; }
  .area-btns .btn { flex: 1; font-size: 13.5px; padding: 10px 4px; }

  .save-box { background: rgba(255,255,255,.8); border-radius: 14px; padding: 12px; margin-top: 14px; }
  .save-box summary { font-weight: bold; cursor: pointer; }
  .save-note { font-size: 12px; color: #607089; margin: 8px 0; }
  .save-box .btn { width: 100%; margin: 4px 0; font-size: 14px; }
  #save-io { width: 100%; height: 64px; border-radius: 10px; border: 2px solid #cdd7e4; padding: 8px; font-size: 12px; margin: 4px 0; }

  /* ---------- バトル ---------- */
  #screen-battle.active { display: flex; flex-direction: column; min-height: calc(100vh - 24px); }
  .b-area-label { text-align: center; font-size: 13px; font-weight: bold; color: #38618c; margin-bottom: 6px; }
  .b-side { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 6px 2px; }
  .b-info { background: rgba(255,255,255,.92); border-radius: 14px; padding: 10px 12px; flex: 1; max-width: 240px; box-shadow: 0 2px 5px rgba(0,0,0,.1); }
  .b-namerow { display: flex; justify-content: space-between; align-items: baseline; gap: 6px; font-weight: bold; font-size: 15px; }
  .b-lv { font-size: 12px; color: #607089; white-space: nowrap; }
  .b-art {
    width: 100px; height: 100px; border-radius: 50%; border: 4px solid; flex-shrink: 0;
    padding: 6px; overflow: hidden;
  }
  #b-player { margin-top: 4px; }
  .b-hpnum { font-size: 12px; color: #607089; text-align: right; margin-top: 3px; font-weight: bold; }

  .ail {
    display: inline-block; color: #fff; font-size: 10px; font-weight: bold;
    border-radius: 6px; padding: 1px 6px; margin-left: 5px; vertical-align: middle;
  }

  .hpbar { background: #dfe6ef; border-radius: 999px; height: 12px; margin-top: 7px; overflow: hidden; }
  .hpfill { height: 100%; border-radius: 999px; background: #4caf50; transition: width .4s; }
  .hpfill.mid { background: #ffa726; }
  .hpfill.low { background: #ef5350; }

  #battle-msg {
    margin-top: auto; background: #23395d; color: #fff; border: 3px solid #fff; border-radius: 14px;
    min-height: 64px; padding: 12px 14px; font-size: 15px; line-height: 1.55; cursor: pointer;
    box-shadow: 0 3px 8px rgba(0,0,0,.2); position: relative;
  }
  #battle-msg.waiting::after {
    content: '▼'; position: absolute; right: 12px; bottom: 6px; font-size: 12px;
    animation: blink 1s infinite;
  }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: .1; } }

  #b-actions { margin-top: 10px; }
  #b-moves { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .mvbtn {
    border: none; border-left: 8px solid; border-radius: 12px; background: #fff; padding: 9px 10px;
    font-family: inherit; text-align: left; cursor: pointer; box-shadow: 0 2px 0 rgba(0,0,0,.12); min-height: 56px;
  }
  .mvbtn:active { transform: translateY(2px); box-shadow: none; }
  .mvbtn:disabled { opacity: .45; }
  .mvbtn.agaku { border-left-color: #9e9e9e; grid-column: 1 / -1; }
  .mv-name { display: flex; justify-content: space-between; align-items: baseline; font-weight: bold; font-size: 13.5px; }
  .mv-pp { font-size: 10.5px; color: #607089; font-weight: bold; white-space: nowrap; margin-left: 4px; }
  .mv-pp.ppred { color: #e53935; }
  .mv-sub { display: block; font-size: 10.5px; color: #607089; margin-top: 3px; }
  #b-sub { display: flex; gap: 8px; }

  @keyframes shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-7px); } 40% { transform: translateX(7px); } 60% { transform: translateX(-5px); } 80% { transform: translateX(5px); } }
  .shake { animation: shake .4s; }

  /* ---------- 手持ち（2×2グリッド） ---------- */
  .party-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .party-cell {
    position: relative; background: rgba(255,255,255,.92); border-radius: 16px; padding: 12px 8px;
    text-align: center; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,.08);
  }
  .party-cell:active { transform: translateY(1px); }
  .lead-badge {
    position: absolute; top: 8px; left: 8px; background: #ffb340; color: #4a2f00;
    font-size: 9.5px; font-weight: bold; border-radius: 999px; padding: 2px 7px;
  }
  .pc-art { width: 84px; height: 84px; border-radius: 50%; border: 3px solid; margin: 0 auto 6px; padding: 5px; overflow: hidden; }
  .pc-name { font-weight: bold; font-size: 13.5px; }
  .pc-lv { font-size: 11px; color: #607089; margin-top: 2px; }
  .party-note { font-size: 11.5px; color: #8a93a5; text-align: center; margin: 8px 0; }

  .box-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .box-cell { background: rgba(255,255,255,.92); border-radius: 14px; padding: 10px 6px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,.07); }
  .bc-art { width: 52px; height: 52px; border-radius: 50%; border: 2.5px solid; margin: 0 auto 4px; padding: 3px; overflow: hidden; }
  .bc-name { font-size: 11.5px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bc-lv { font-size: 10.5px; color: #607089; }
  .box-cell .btn { font-size: 10.5px; padding: 5px 8px; min-height: 30px; margin-top: 5px; }
  .section-title { font-size: 15px; font-weight: bold; color: #1f4e79; margin: 16px 0 8px; }
  .empty-note { font-size: 12.5px; color: #8a93a5; background: rgba(255,255,255,.6); border-radius: 12px; padding: 12px; text-align: center; }

  /* 技一覧テーブル（手持ち詳細・図鑑） */
  .mv-table { background: #f2f4f8; border-radius: 12px; padding: 8px; margin: 10px 0; text-align: left; }
  .mv-row { display: flex; align-items: center; gap: 6px; padding: 4px 2px; flex-wrap: wrap; }
  .mv-chip { font-size: 10px; font-weight: bold; color: #fff; border-radius: 999px; padding: 2px 8px; flex-shrink: 0; }
  .mvr-name { font-weight: bold; font-size: 12.5px; }
  .mvr-stats { font-size: 10.5px; color: #607089; margin-left: auto; }

  /* ---------- 図鑑 ---------- */
  .dex-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .dex-cell {
    background: #f2f4f8; border-radius: 14px; padding: 10px 4px; text-align: center; cursor: pointer;
    box-shadow: 0 2px 5px rgba(0,0,0,.07);
  }
  .dex-no { font-size: 10px; color: #8a93a5; font-weight: bold; }
  .dex-art { width: 60px; height: 60px; margin: 2px auto; }
  .dex-name { font-size: 11px; font-weight: bold; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .comp-bar { background: rgba(255,255,255,.92); border-radius: 12px; padding: 10px 12px; margin-bottom: 10px; font-size: 13.5px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,.08); }

  /* ---------- エンディング ---------- */
  #screen-ending { text-align: center; padding-top: 40px; }
  .end-art { width: 140px; height: 140px; margin: 0 auto; }
  #ending-body h2 { color: #b8860b; font-size: 26px; margin: 12px 0; }
  #ending-body p { background: rgba(255,255,255,.9); border-radius: 14px; padding: 14px; margin: 10px 0; font-size: 14.5px; line-height: 1.7; }

  /* ---------- タブ ---------- */
  #tabbar {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px; display: flex; background: #fff;
    border-radius: 18px 18px 0 0; box-shadow: 0 -3px 12px rgba(0,0,0,.12); z-index: 50;
  }
  .tab {
    flex: 1; border: none; background: none; font-family: inherit; font-size: 20px;
    padding: 9px 0 11px; cursor: pointer; color: #8a93a5; display: flex; flex-direction: column; align-items: center; gap: 1px;
  }
  .tab span { font-size: 10.5px; font-weight: bold; }
  .tab.active { color: #ff7043; }

  /* ---------- モーダル・トースト ---------- */
  #modal { display: none; position: fixed; inset: 0; z-index: 100; }
  #modal.open { display: block; }
  #modal-back { position: absolute; inset: 0; background: rgba(0,0,0,.45); }
  #modal-card {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
    width: calc(100% - 48px); max-width: 400px; max-height: 78vh; overflow-y: auto;
    background: #fff; border-radius: 18px; padding: 18px;
  }
  #modal-body h3 { font-size: 16px; margin-bottom: 12px; text-align: center; }
  .modal-btns { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
  .modal-btns .btn { width: 100%; }
  .pick {
    display: flex; align-items: center; gap: 10px; width: 100%; border: 2px solid #dfe6ef; border-radius: 12px;
    background: #fff; padding: 8px 10px; font-family: inherit; font-size: 14px; font-weight: bold; cursor: pointer; margin-bottom: 8px;
  }
  .pick:active { background: #f2f4f8; }
  .pk-art { width: 40px; height: 40px; flex-shrink: 0; }
  .pick .pk-sub { font-size: 11.5px; color: #607089; font-weight: normal; margin-left: auto; white-space: nowrap; }
  .dexd { text-align: center; }
  .dexd > .art { width: 120px; height: 120px; margin: 0 auto; }
  .dexd h3 { margin: 8px 0 4px; }
  .type-chip { display: inline-block; color: #fff; font-size: 12px; font-weight: bold; border-radius: 999px; padding: 3px 12px; margin: 4px 0; }
  .dd-desc { font-size: 13.5px; line-height: 1.7; background: #f2f4f8; border-radius: 12px; padding: 10px; margin: 10px 0; text-align: left; }
  .dd-stats { font-size: 12.5px; color: #607089; line-height: 1.7; }

  /* どうぐ一覧 */
  .item-row { border-bottom: 1px dashed #dfe6ef; padding: 8px 2px; display: flex; flex-wrap: wrap; align-items: baseline; gap: 6px; }
  .item-row.none { opacity: .45; }
  .item-name { font-weight: bold; font-size: 14px; }
  .item-count { font-size: 12.5px; color: #607089; font-weight: bold; }
  .item-desc { width: 100%; font-size: 11px; color: #8a93a5; }
  .bag-note { font-size: 11px; color: #8a93a5; margin-top: 8px; }

  /* 探検の休けい */
  .rest-note { font-size: 12.5px; color: #607089; text-align: center; margin-bottom: 8px; }
  .reward-note { font-size: 13px; font-weight: bold; color: #b8860b; background: #fff8e1; border-radius: 10px; padding: 8px; margin: 8px 0; text-align: center; }
  .rest-row { display: flex; align-items: center; gap: 8px; padding: 5px 2px; border-bottom: 1px dashed #dfe6ef; }
  .rest-row.dead { opacity: .45; }
  .rest-name { font-weight: bold; font-size: 13px; }
  .rest-hp { margin-left: auto; font-size: 11.5px; color: #607089; font-weight: bold; white-space: nowrap; }
  .retire-note { font-size: 11px; color: #8a93a5; text-align: center; margin-top: 8px; line-height: 1.6; }

  #toast {
    position: fixed; top: 14px; left: 50%; transform: translateX(-50%) translateY(-80px);
    background: #23395d; color: #fff; font-size: 13.5px; font-weight: bold;
    border-radius: 999px; padding: 10px 20px; z-index: 200; transition: transform .3s; max-width: 90%;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
</style>


<div id="app">

  <!-- タイトル・御三家選択 -->
  <div id="screen-title" class="screen">
    <div class="title-logo">
      <div class="title-sun">🌻🌊☀️</div>
      <h1>サマモン</h1>
      <p class="title-sub">なつやすみの モンスターだいぼうけん２</p>
    </div>
    <div class="title-box">
      <h2>さいしょの あいぼうを えらぼう！</h2>
      <div id="starter-cards"></div>
    </div>
  </div>

  <!-- マップ -->
  <div id="screen-map" class="screen">
    <div class="map-header">
      <span class="map-title">🗺️ ぼうけんマップ</span>
      <button id="map-bag" class="bag-chip" onclick="openBag()"></button>
    </div>
    <div id="area-list"></div>
    <details class="save-box">
      <summary>💾 セーブデータ</summary>
      <p class="save-note">べつの たんまつで あそぶときは セーブコードを つかってね。<br>（ふだんは じどうで セーブされるよ）</p>
      <button class="btn" onclick="uiExport()">コードを かきだす</button>
      <textarea id="save-io" placeholder="ここに コードを はりつけて「よみこむ」"></textarea>
      <button class="btn" onclick="uiImport()">コードを よみこむ</button>
      <button class="btn danger" onclick="uiReset()">さいしょから やりなおす</button>
    </details>
  </div>

  <!-- バトル -->
  <div id="screen-battle" class="screen">
    <div id="b-area" class="b-area-label"></div>
    <div id="b-enemy" class="b-side">
      <div class="b-info">
        <div class="b-namerow"><span id="b-e-name"></span><span id="b-e-lv" class="b-lv"></span></div>
        <div class="hpbar"><div id="b-e-hp" class="hpfill"></div></div>
      </div>
      <div id="b-e-art" class="b-art"></div>
    </div>
    <div id="b-player" class="b-side">
      <div id="b-p-art" class="b-art"></div>
      <div class="b-info">
        <div class="b-namerow"><span id="b-p-name"></span><span id="b-p-lv" class="b-lv"></span></div>
        <div class="hpbar"><div id="b-p-hp" class="hpfill"></div></div>
        <div id="b-p-hpnum" class="b-hpnum"></div>
      </div>
    </div>
    <div id="battle-msg" onclick="tapMsg()"></div>
    <div id="b-actions">
      <div id="b-moves"></div>
      <div id="b-sub">
        <button id="b-item" class="btn sub" onclick="actItemUI()">🎒 どうぐ</button>
        <button class="btn sub" onclick="actSwitchUI()">🔄 こうたい</button>
        <button id="b-run" class="btn sub" onclick="actRun()">🏃 にげる</button>
      </div>
    </div>
  </div>

  <!-- 手持ち・ボックス -->
  <div id="screen-party" class="screen">
    <div id="party-body"></div>
  </div>

  <!-- 図鑑 -->
  <div id="screen-dex" class="screen">
    <div id="dex-body"></div>
  </div>

  <!-- エンディング -->
  <div id="screen-ending" class="screen">
    <div id="ending-body"></div>
  </div>

  <!-- 下タブ -->
  <nav id="tabbar">
    <button class="tab" data-s="map">🗺️<span>マップ</span></button>
    <button class="tab" data-s="party">🎒<span>てもち</span></button>
    <button class="tab" data-s="dex">📖<span>ずかん</span></button>
  </nav>

  <!-- 汎用モーダル -->
  <div id="modal">
    <div id="modal-back" onclick="modalBackClick()"></div>
    <div id="modal-card"><div id="modal-body"></div></div>
  </div>

  <div id="toast"></div>

<script>
/* ========== マスタ参照・共通ロジック・画面切替（v2） ========== */

const MON = {};
MASTER.monsters.forEach(m => MON[m.id] = m);
const MOVES = MASTER.moves;
const AREAS = MASTER.areas.slice().sort((a, b) => a.order - b.order);
const TRAINERS = MASTER.trainers;
const ITEMS = {};
MASTER.items.forEach(it => ITEMS[it.id] = it);

const TYPE_COLOR = { '火': '#ff7043', '水': '#42a5f5', '草': '#66bb6a', '光': '#eab308', '闇': '#7c3aed', 'ノーマル': '#9e9e9e' };
const CATCH_BASE = { 1: 0.80, 2: 0.60, 3: 0.40, 4: 0.25, 5: 0.10 };
const AIL_NAME = { psn: 'どく', par: 'まひ', slp: 'ねむり' };
const AIL_COLOR = { psn: '#9c27b0', par: '#f9a825', slp: '#5c6bc0' };
const MAX_LV = 50;
const PARTY_MAX = 4;
const MAX_ITEM = 9;   // アイテム所持上限（各9個）
const AGAKU = 'M99';  // 全PP切れ時の自動技

let G = null;  // セーブ対象のゲーム状態

function newGame() {
  return {
    party: [], box: [], dex: {}, cleared: [],
    items: { I5: 5, I1: 2 },   // 初期所持: ボール5・キズぐすり2
    bossRewarded: [],          // 初回撃破報酬を受け取ったトレーナーID
    endingSeen: false,         // ゲッショク撃破済み（A8にゲッショク出現解禁）
    uid: 1
  };
}
function newMon(sid, lv) {
  return { uid: G.uid++, sid: sid, lv: lv, exp: 0 };
}
function spec(mon) { return MON[mon.sid]; }
function pad2(id) { return String(id).padStart(2, '0'); }

/* ---------- SVG描画 ----------
   cls例: 'sil'=図鑑シルエット（bg要素も自動非表示）。ARTに無いIDは？表示 */
function artHtml(sid, cls) {
  const svg = ART[pad2(sid)] || '<div class="art-missing">？</div>';
  return '<div class="art' + (cls ? ' ' + cls : '') + '">' + svg + '</div>';
}

/* ---------- アイテム ---------- */
function itemCount(id) { return G.items[id] || 0; }
function addItem(id, n) {
  const before = itemCount(id);
  G.items[id] = Math.min(MAX_ITEM, before + n);
  return G.items[id] - before;  // 実際に増えた数（上限あふれ確認用）
}
function takeItem(id) {
  if (itemCount(id) <= 0) return false;
  G.items[id]--;
  return true;
}
/* 報酬リスト [{item,n}] を付与してメッセージ文字列を返す */
function grantRewards(list) {
  return list.map(r => {
    const got = addItem(r.item, r.n);
    const name = ITEMS[r.item].name;
    return name + '×' + r.n + (got < r.n ? '（もちきれない ぶんは あきらめた）' : '');
  }).join('、');
}

/* どうぐ一覧モーダル（マップ用・閲覧のみ。使うのはバトル・探検中だけ） */
function openBag() {
  const rows = MASTER.items.map(it => {
    const n = itemCount(it.id);
    return '<div class="item-row' + (n === 0 ? ' none' : '') + '">' +
      '<span class="item-name">' + esc(it.name) + '</span>' +
      '<span class="item-count">×' + n + '</span>' +
      '<div class="item-desc">' + esc(it.desc) + '</div></div>';
  }).join('');
  openModal('<h3>🎒 どうぐ</h3>' + rows +
    '<p class="bag-note">かいふく系は バトルや たんけんの 休けい中に つかえるよ（各' + MAX_ITEM + 'こまで もてる）</p>' +
    '<div class="modal-btns"><button class="btn" onclick="closeModal()">とじる</button></div>');
}

/* ---------- 能力値・経験値（v1のまま） ---------- */
function maxHp(mon) { return Math.floor(spec(mon).hp * mon.lv / 50) + mon.lv + 10; }
function statOf(mon, key) { return Math.floor(spec(mon)[key] * mon.lv / 50) + 5; }
function expNeed(lv) { return lv * lv + 10; }
function expGain(mon) {
  const s = spec(mon);
  return Math.floor(mon.lv * (2 + (s.hp + s.atk + s.def + s.spd) / 20));
}

/* ---------- タイプ相性（v2: 光⇔闇は相互1.5倍） ---------- */
function typeEff(atkType, defType) {
  if ((atkType === '光' && defType === '闇') || (atkType === '闇' && defType === '光')) return 1.5;
  const win = { '火': '草', '草': '水', '水': '火' };
  if (win[atkType] === defType) return 1.5;
  if (win[defType] === atkType) return 0.5;
  return 1;
}

/* ---------- 図鑑 ---------- */
function markDex(id, state) {
  if ((G.dex[id] || 0) < state) G.dex[id] = state;
}
function dexState(id) { return G.dex[id] || 0; }
function dexCaughtCount() { return MASTER.monsters.filter(m => dexState(m.id) === 2).length; }

/* ---------- 経験値付与→レベルアップ→進化 ---------- */
function gainExpMsgs(mon, amount) {
  const msgs = [spec(mon).name + 'は ' + amount + 'の けいけんちを もらった！'];
  mon.exp += amount;
  while (mon.lv < MAX_LV && mon.exp >= expNeed(mon.lv)) {
    mon.exp -= expNeed(mon.lv);
    mon.lv++;
    msgs.push(spec(mon).name + 'は レベル' + mon.lv + 'に あがった！');
    const s = spec(mon);
    if (s.evLv && mon.lv >= s.evLv && MON[mon.sid + 1] && MON[mon.sid + 1].line === s.line) {
      const oldName = s.name;
      mon.sid = mon.sid + 1;
      markDex(mon.sid, 2);
      comment('evolve');
      msgs.push('おや…！？ ' + oldName + 'の ようすが…！');
      msgs.push(oldName + 'は ' + spec(mon).name + 'に しんかした！');
    }
  }
  return msgs;
}

/* ---------- 画面切替 ---------- */
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  const showTab = (name === 'map' || name === 'party' || name === 'dex');
  document.getElementById('tabbar').style.display = showTab ? 'flex' : 'none';
  document.querySelectorAll('#tabbar .tab').forEach(t => t.classList.toggle('active', t.dataset.s === name));
  if (name === 'map') renderMap();
  if (name === 'party') renderParty();
  if (name === 'dex') renderDex();
}

/* ---------- モーダル・トースト ---------- */
let modalLocked = false;
function openModal(html, locked) {
  modalLocked = !!locked;
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal').classList.add('open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  modalLocked = false;
}
function modalBackClick() { if (!modalLocked) closeModal(); }

let toastTimer = null;
function toast(text) {
  const el = document.getElementById('toast');
  el.textContent = text;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

/* ---------- タイトル・御三家 ---------- */
function renderTitle() {
  document.getElementById('starter-cards').innerHTML = [1, 10, 19].map(id => {
    const m = MON[id];
    const c = TYPE_COLOR[m.type];
    return '<div class="starter-card" style="border-color:' + c + '" onclick="chooseStarter(' + id + ')">' +
      '<div class="st-art" style="background:' + c + '22">' + artHtml(id) + '</div>' +
      '<div class="st-name">' + esc(m.name) + '</div>' +
      '<div class="st-type" style="color:' + c + '">' + m.type + 'タイプ</div></div>';
  }).join('');
}

function chooseStarter(id) {
  const m = MON[id];
  openModal('<div class="dexd">' + artHtml(id) + '<h3>' + esc(m.name) + 'に きめる？</h3></div>' +
    '<div class="modal-btns">' +
    '<button class="btn primary" onclick="confirmStarter(' + id + ')">きめた！</button>' +
    '<button class="btn" onclick="closeModal()">やっぱり かんがえる</button></div>');
}

function confirmStarter(id) {
  closeModal();
  G = newGame();
  G.party = [newMon(id, 5)];
  markDex(id, 2);
  saveGame();
  toast(MON[id].name + 'と ぼうけんに しゅっぱつ！');
  showScreen('map');
}

/* ---------- 起動 ---------- */
function init() {
  document.querySelectorAll('#tabbar .tab').forEach(t => t.onclick = () => showScreen(t.dataset.s));
  const s = loadGame();
  if (s) {
    G = s;
    showScreen('map');
  } else {
    G = newGame();
    renderTitle();
    showScreen('title');
  }
}
window.addEventListener('load', init);
</script>

<script>
/* ========== セーブ（localStorage＋セーブコード・v2） ==========
   v2はスキーマ刷新のためキーを変更（v1データは引き継がない・新規スタート）。
   探検セッション（S）はセーブしない: とちゅうで閉じたらリタイア扱い。 */

const SAVE_KEY = 'samamon_save_v2';

function saveGame() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(G)); } catch (e) { /* プライベートモード等は諦める */ }
}

function loadGame() {
  try {
    const j = localStorage.getItem(SAVE_KEY);
    if (!j) return null;
    const g = JSON.parse(j);
    return isValidSave(g) ? g : null;
  } catch (e) { return null; }
}

function isValidSave(g) {
  return g && Array.isArray(g.party) && g.party.length > 0 &&
    Array.isArray(g.box) && g.items && typeof g.items === 'object' &&
    Array.isArray(g.bossRewarded) &&
    g.party.every(m => MON[m.sid]);
}

/* セーブコード: JSON→UTF-8→Base64（機種変更・別端末用の保険） */
function uiExport() {
  const code = btoa(unescape(encodeURIComponent(JSON.stringify(G))));
  const ta = document.getElementById('save-io');
  ta.value = code;
  ta.select();
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(code).then(
      () => toast('セーブコードを コピーしたよ！'),
      () => toast('コードを ながおしして コピーしてね')
    );
  } else {
    toast('コードを ながおしして コピーしてね');
  }
}

function uiImport() {
  const code = document.getElementById('save-io').value.trim();
  if (!code) { toast('さきに コードを はりつけてね'); return; }
  try {
    const g = JSON.parse(decodeURIComponent(escape(atob(code))));
    if (!isValidSave(g)) throw new Error('invalid');
    G = g;
    saveGame();
    toast('セーブコードを よみこんだよ！');
    showScreen('map');
  } catch (e) {
    toast('コードが ただしくないみたい…');
  }
}

function uiReset() {
  openModal('<h3>ほんとうに さいしょから やりなおす？<br>いまの データは きえちゃうよ！</h3>' +
    '<div class="modal-btns">' +
    '<button class="btn danger" onclick="doReset()">データを けして やりなおす</button>' +
    '<button class="btn" onclick="closeModal()">やめておく</button></div>');
}

function doReset() {
  closeModal();
  try { localStorage.removeItem(SAVE_KEY); } catch (e) {}
  G = newGame();
  renderTitle();
  showScreen('title');
}
</script>

<script>
/* ========== マップ画面（エリア選択・v2） ========== */

function renderMap() {
  const balls = itemCount('I5') + itemCount('I6');
  document.getElementById('map-bag').innerHTML = '🥎×' + balls + '　🎒 どうぐ';

  let prevCleared = true;  // A1は常に解放
  document.getElementById('area-list').innerHTML = AREAS.map(a => {
    const locked = !prevCleared;
    const cleared = G.cleared.includes(a.id);
    prevCleared = cleared;
    const bossOnly = a.battles === 0;

    const sub = bossOnly
      ? 'つよてきとの たたかいが まっている…'
      : 'Lv' + a.lvMin + '〜' + a.lvMax + '　たんけん1回 = ' + a.battles + 'れんせん（HPとPPは もちこし！）';

    let body;
    if (locked) {
      body = '<div class="area-lock">🔒 まえの エリアの ボスを たおすと ひらくよ</div>';
    } else {
      const explore = !bossOnly
        ? '<button class="btn primary" onclick="startExplore(\'' + a.id + '\')">🌿 たんけんする</button>' : '';
      const bossName = TRAINERS[a.bossId].name;
      const bossLabel = cleared ? '⚔️ ' + esc(bossName) + 'と もういちど' : '⚔️ ' + esc(bossName) + 'に いどむ';
      body = '<div class="area-btns">' + explore +
        '<button class="btn boss" onclick="startBoss(\'' + a.id + '\')">' + bossLabel + '</button></div>';
    }

    return '<div class="area-card' + (locked ? ' locked' : '') + '">' +
      '<div class="area-head"><span class="area-name">' + (locked ? '？？？' : esc(a.name)) + '</span>' +
      (cleared ? '<span class="badge">クリア ✓</span>' : '') + '</div>' +
      '<div class="area-sub">' + (locked ? '' : sub) + '</div>' + body + '</div>';
  }).join('');
}
</script>

<script>
/* ========== バトル・探検セッション（v2） ==========
   S = 探検セッション状態（HP/PP/状態異常を連戦で持ち越す。セーブ対象外・探検終了で破棄）
   B = 1バトルの状態（敵のHP/PP/状態異常など） */

let S = null;
let B = null;
let sayResolve = null;

/* ---- メッセージウィンドウ（タップで送る） ---- */
function say(text) {
  return new Promise(resolve => {
    const w = document.getElementById('battle-msg');
    w.textContent = text;
    w.classList.add('waiting');
    sayResolve = resolve;
  });
}
function tapMsg() {
  if (!sayResolve) return;
  const r = sayResolve;
  sayResolve = null;
  document.getElementById('battle-msg').classList.remove('waiting');
  r();
}

function hideActions() { document.getElementById('b-actions').classList.add('hidden'); }
function playerTurnUI() {
  renderBattle();
  document.getElementById('b-actions').classList.remove('hidden');
  document.getElementById('battle-msg').textContent = spec(pm()).name + 'は どうする？';
}

/* ---- 参照ヘルパ ---- */
function em() { return B.enemies[B.ei]; }
function pm() { return G.party[B.ai]; }
function ename() { return (B.kind === 'wild' ? 'やせいの ' : '') + spec(em()).name; }
function pHp() { return S.hp[B.ai]; }
function pSt() { return S.st[B.ai]; }

/* ---- セッション（プレイヤー側の持ち越し状態） ---- */
function ppInit(mon) {
  const o = {};
  spec(mon).moves.forEach(id => o[id] = MOVES[id].pp);
  return o;
}
function newSession(mode, areaId, total) {
  return {
    mode: mode, areaId: areaId, total: total, done: 0,
    hp: G.party.map(m => maxHp(m)),
    pp: G.party.map(m => ppInit(m)),
    st: G.party.map(() => null),
    slp: G.party.map(() => 0),
    pinched: G.party.map(() => false)
  };
}
function sessionPush(mon) {  // 探検中に捕まえた子が手持ちに入るとき
  S.hp.push(maxHp(mon));
  S.pp.push(ppInit(mon));
  S.st.push(null);
  S.slp.push(0);
  S.pinched.push(false);
}
function firstAlive() { return S.hp.findIndex(h => h > 0); }

/* ---- 探検・ボス戦の開始 ---- */
function pickWild(areaId) {
  const pool = [];
  MASTER.monsters.forEach(m => {
    if (m.id === 48 && !G.endingSeen) return;  // ゲッショクはクリア後解禁
    m.spawns.forEach(sp => { if (sp.area === areaId) pool.push({ m: m, rate: sp.rate }); });
  });
  const total = pool.reduce((s, p) => s + p.rate, 0);
  let r = Math.random() * total;
  for (const p of pool) { r -= p.rate; if (r < 0) return p.m; }
  return pool[0].m;
}

async function startExplore(areaId) {
  const area = AREAS.find(a => a.id === areaId);
  S = newSession('explore', areaId, area.battles);
  await nextExploreBattle();
}

async function nextExploreBattle() {
  const area = AREAS.find(a => a.id === S.areaId);
  const sp = pickWild(S.areaId);
  const lv = area.lvMin + Math.floor(Math.random() * (area.lvMax - area.lvMin + 1));
  await beginBattle({ kind: 'wild', area: area, enemies: [{ sid: sp.id, lv: lv }] });
}

async function startBoss(areaId) {
  const area = AREAS.find(a => a.id === areaId);
  const tr = TRAINERS[area.bossId];
  S = newSession('boss', areaId, 1);
  await beginBattle({
    kind: 'boss', area: area, trainer: tr,
    enemies: tr.party.map(p => ({ sid: p.sid, lv: p.lv }))
  });
}

async function beginBattle(opt) {
  B = {
    kind: opt.kind, area: opt.area, trainer: opt.trainer || null,
    enemies: opt.enemies, ei: 0, ehp: 0, epp: {}, est: null, eslp: 0,
    ai: firstAlive(), over: false, turnEnd: false
  };
  setEnemy(0);
  showScreen('battle');
  hideActions();

  if (B.kind === 'boss') {
    comment('boss');
    await say(B.trainer.name + 'が しょうぶを しかけてきた！');
    await say('「' + B.trainer.quote + '」');
    await say(B.trainer.name + 'は ' + spec(em()).name + 'を くりだした！');
  } else {
    if (spec(em()).rarity === 5) comment('legend');
    await say('あっ！ ' + ename() + 'が とびだしてきた！');
  }
  await say('ゆけっ！ ' + spec(pm()).name + '！');
  playerTurnUI();
}

function setEnemy(i) {
  B.ei = i;
  B.ehp = maxHp(em());
  B.epp = ppInit(em());
  B.est = null;
  B.eslp = 0;
  markDex(em().sid, 1);
  renderBattle();
}

/* ---- 画面更新 ---- */
function setHpBar(el, cur, max) {
  const pct = Math.max(0, cur / max);
  el.style.width = (pct * 100) + '%';
  el.className = 'hpfill' + (pct <= 0.2 ? ' low' : pct <= 0.5 ? ' mid' : '');
}

function ailBadge(st) {
  if (!st) return '';
  return '<span class="ail" style="background:' + AIL_COLOR[st] + '">' + AIL_NAME[st] + '</span>';
}

function renderBattle() {
  if (!B) return;
  const es = spec(em()), ps = spec(pm());
  const progress = (B.kind === 'wild' && S) ? '　' + (S.done + 1) + 'せんめ / ' + S.total : '';
  document.getElementById('b-area').textContent =
    B.area.name + (B.kind === 'boss' ? '　⚔️ ボスせん' : progress);

  const ee = document.getElementById('b-e-art');
  ee.innerHTML = artHtml(es.id);
  ee.style.borderColor = TYPE_COLOR[es.type];
  ee.style.background = TYPE_COLOR[es.type] + '33';
  document.getElementById('b-e-name').textContent = ename();
  document.getElementById('b-e-lv').innerHTML = 'Lv.' + em().lv + ailBadge(B.est);
  setHpBar(document.getElementById('b-e-hp'), B.ehp, maxHp(em()));

  const pe = document.getElementById('b-p-art');
  pe.innerHTML = artHtml(ps.id);
  pe.style.borderColor = TYPE_COLOR[ps.type];
  pe.style.background = TYPE_COLOR[ps.type] + '33';
  document.getElementById('b-p-name').textContent = ps.name;
  document.getElementById('b-p-lv').innerHTML = 'Lv.' + pm().lv + ailBadge(pSt());
  setHpBar(document.getElementById('b-p-hp'), pHp(), maxHp(pm()));
  document.getElementById('b-p-hpnum').textContent = 'HP ' + Math.max(0, pHp()) + ' / ' + maxHp(pm());

  /* 技ボタン: 威力・命中・残PPを常時表示。全PP切れなら「あがく」だけ */
  const ppOf = id => S.pp[B.ai][id] || 0;
  const anyPP = ps.moves.some(id => ppOf(id) > 0);
  let movesHtml;
  if (anyPP) {
    movesHtml = ps.moves.map((id, i) => {
      const mv = MOVES[id];
      const left = ppOf(id);
      const sub = mv.type + '　' +
        (mv.power > 0 ? 'いりょく' + mv.power : (mv.ailment ? AIL_NAME[mv.ailment] + 'にする' : 'HPかいふく')) +
        '　めいちゅう' + mv.acc;
      return '<button class="mvbtn" style="border-left-color:' + TYPE_COLOR[mv.type] + '"' +
        (left <= 0 ? ' disabled' : '') + ' onclick="actMove(' + i + ')">' +
        '<span class="mv-name">' + esc(mv.name) + '<span class="mv-pp' + (left <= 1 ? ' ppred' : '') + '">PP ' + left + '/' + mv.pp + '</span></span>' +
        '<span class="mv-sub">' + sub + '</span></button>';
    }).join('');
  } else {
    const ag = MOVES[AGAKU];
    movesHtml = '<button class="mvbtn agaku" onclick="actMove(-1)">' +
      '<span class="mv-name">' + esc(ag.name) + '<span class="mv-pp">PP ∞</span></span>' +
      '<span class="mv-sub">PPが なくなった！ 反動ダメージあり</span></button>';
  }
  document.getElementById('b-moves').innerHTML = movesHtml;

  document.getElementById('b-item').textContent = '🎒 どうぐ';
  document.getElementById('b-run').disabled = (B.kind === 'boss');
}

function hitAnim(id) {
  const el = document.getElementById(id);
  el.classList.remove('shake');
  void el.offsetWidth;
  el.classList.add('shake');
}

/* ---- ターン進行 ---- */
function spdOf(mon, st) {
  return statOf(mon, 'spd') * (st === 'par' ? 0.5 : 1);
}

async function actMove(i) {
  if (!B || B.over) return;
  const mv = i < 0 ? MOVES[AGAKU] : MOVES[spec(pm()).moves[i]];
  if (!mv) return;
  if (i < 0) comment('agaku');
  hideActions();
  await runTurn(mv);
}

/* プレイヤーの選択（技 or null=アイテム使用済み）を受けて1ターン回す */
async function runTurn(playerMove) {
  B.turnEnd = false;
  const order = spdOf(pm(), pSt()) >= spdOf(em(), B.est) ? ['p', 'e'] : ['e', 'p'];
  for (const w of order) {
    if (B.over || B.turnEnd) break;
    if (w === 'p') {
      if (playerMove) { if (await preAct(true)) await execMove(true, playerMove); }
      /* playerMove=null はアイテム使用ターン（行動済み扱い） */
    } else {
      await enemyAct();
    }
  }
  if (!B.over) await endOfTurn();
  if (!B.over) playerTurnUI();
}

/* 行動前チェック（ねむり・まひ）。falseなら行動不能 */
async function preAct(isPlayer) {
  const name = isPlayer ? spec(pm()).name : ename();
  const st = isPlayer ? pSt() : B.est;
  if (st === 'slp') {
    if (isPlayer) S.slp[B.ai]--; else B.eslp--;
    const left = isPlayer ? S.slp[B.ai] : B.eslp;
    if (left <= 0) {
      if (isPlayer) S.st[B.ai] = null; else B.est = null;
      renderBattle();
      await say(name + 'は めを さました！');
      return true;
    }
    await say(name + 'は ぐうぐう ねむっている…');
    return false;
  }
  if (st === 'par' && Math.random() < 0.25) {
    await say(name + 'は からだが しびれて うごけない！');
    return false;
  }
  return true;
}

/* ---- 技の実行 ---- */
function decPP(isPlayer, mv) {
  if (mv.id === AGAKU) return;
  if (isPlayer) S.pp[B.ai][mv.id]--;
  else B.epp[mv.id]--;
}

async function execMove(isPlayer, mv) {
  const atkMon = isPlayer ? pm() : em();
  const name = isPlayer ? spec(pm()).name : ename();
  decPP(isPlayer, mv);
  await say(name + 'の ' + mv.name + '！');

  /* 回復技（おひるね） */
  if (mv.power === 0 && !mv.ailment) {
    const mx = maxHp(atkMon);
    const heal = Math.floor(mx / 2);
    if (isPlayer) S.hp[B.ai] = Math.min(mx, pHp() + heal);
    else B.ehp = Math.min(mx, B.ehp + heal);
    renderBattle();
    await say(spec(atkMon).name + 'は ひとやすみして HPを かいふくした！');
    return;
  }

  if (Math.random() * 100 >= mv.acc) {
    await say('しかし はずれてしまった！');
    return;
  }

  /* 状態異常技 */
  if (mv.power === 0 && mv.ailment) {
    const curSt = isPlayer ? B.est : pSt();
    const defName = isPlayer ? ename() : spec(pm()).name;
    if (curSt) {
      await say('しかし うまく きまらなかった！');
      return;
    }
    if (Math.random() * 100 < mv.ailChance) {
      const turns = 2 + Math.floor(Math.random() * 3);  // ねむりで動けないのは1〜3ターン（起きたターンは動ける）
      if (isPlayer) { B.est = mv.ailment; if (mv.ailment === 'slp') B.eslp = turns; }
      else { S.st[B.ai] = mv.ailment; if (mv.ailment === 'slp') S.slp[B.ai] = turns; }
      renderBattle();
      comment(mv.ailment);
      await say(defName + 'は ' + AIL_NAME[mv.ailment] + 'じょうたいに なった！');
    } else {
      await say('しかし うまく きまらなかった！');
    }
    return;
  }

  /* ダメージ技 */
  const defMon = isPlayer ? em() : pm();
  const atk = statOf(atkMon, 'atk'), def = statOf(defMon, 'def');
  const eff = typeEff(mv.type, spec(defMon).type);
  const crit = Math.random() < 1 / 16;
  let dmg = Math.floor((((2 * atkMon.lv / 5 + 2) * mv.power * atk / def) / 50 + 2) *
    eff * (crit ? 1.5 : 1) * (0.85 + Math.random() * 0.15));
  dmg = Math.max(1, dmg);

  if (isPlayer) { B.ehp -= dmg; hitAnim('b-e-art'); }
  else { S.hp[B.ai] -= dmg; hitAnim('b-p-art'); }
  renderBattle();

  if (crit) { comment('crit'); await say('きゅうしょに あたった！'); }
  if (eff > 1) { comment('effGood'); await say('こうかは ばつぐんだ！'); }
  if (eff < 1) { comment('effBad'); await say('こうかは いまひとつの ようだ…'); }

  /* あがくの反動 */
  if (mv.id === AGAKU) {
    const rec = Math.max(1, Math.floor(dmg / 4));
    if (isPlayer) S.hp[B.ai] -= rec; else B.ehp -= rec;
    renderBattle();
    await say(name + 'は はんどうで ' + rec + 'の ダメージを うけた！');
  }

  /* ピンチ実況（1バトル…ではなく1探検で各1回） */
  if (!isPlayer && pHp() > 0 && pHp() < maxHp(pm()) * 0.25 && !S.pinched[B.ai]) {
    S.pinched[B.ai] = true;
    comment('pinch');
  }

  await checkDowns(isPlayer);
}

/* 倒れ判定（攻撃側→受け側の順で確認。あがく反動の自滅もここで拾う） */
async function checkDowns(isPlayerAttacked) {
  if (!B.over && B.ehp <= 0) {
    await say(ename() + 'は たおれた！');
    await onEnemyDown();
    return;
  }
  if (!B.over && pHp() <= 0) {
    await say(spec(pm()).name + 'は たおれた…！');
    await onPlayerDown();
  }
}

/* ---- ターン終了時のどくダメージ ---- */
async function endOfTurn() {
  if (!B.over && B.est === 'psn' && B.ehp > 0) {
    B.ehp -= Math.max(1, Math.floor(maxHp(em()) / 8));
    renderBattle();
    await say(ename() + 'は どくの ダメージを うけている！');
    if (B.ehp <= 0) { await say(ename() + 'は たおれた！'); await onEnemyDown(); }
  }
  if (!B.over && pSt() === 'psn' && pHp() > 0) {
    S.hp[B.ai] -= Math.max(1, Math.floor(maxHp(pm()) / 8));
    renderBattle();
    await say(spec(pm()).name + 'は どくの ダメージを うけている！');
    if (pHp() <= 0) { await say(spec(pm()).name + 'は たおれた…！'); await onPlayerDown(); }
  }
}

/* ---- CPUの行動 ---- */
async function enemyAct() {
  if (!B || B.over) return;
  if (!(await preAct(false))) return;
  const sp = spec(em());
  const usable = sp.moves.filter(id => (B.epp[id] || 0) > 0);
  let mv;
  if (!usable.length) {
    mv = MOVES[AGAKU];
  } else if (usable.includes('M13') && B.ehp < maxHp(em()) * 0.5 && Math.random() < 0.5) {
    mv = MOVES['M13'];
  } else {
    /* 攻撃技優先。状態異常技はこちらが健康なときだけ候補に */
    const cands = usable.filter(id => {
      const m = MOVES[id];
      if (id === 'M13') return false;
      if (m.power === 0 && m.ailment) return !pSt();
      return true;
    });
    const list = cands.length ? cands : usable;
    mv = MOVES[list[Math.floor(Math.random() * list.length)]];
  }
  await execMove(false, mv);
}

/* ---- どうぐ（バトル中: 1ターン消費） ---- */
function actItemUI() {
  if (!B || B.over) return;
  const usable = MASTER.items.filter(it => itemCount(it.id) > 0 &&
    (it.effect !== 'ball' || B.kind === 'wild'));
  if (!usable.length) { toast('つかえる どうぐが ないよ！'); return; }
  openModal('<h3>🎒 どうぐを つかう（1ターン つかうよ）</h3>' +
    usable.map(it =>
      '<button class="pick" onclick="chooseItem(\'' + it.id + '\')">' + esc(it.name) +
      '<span class="pk-sub">×' + itemCount(it.id) + '</span></button>').join('') +
    '<div class="modal-btns"><button class="btn" onclick="closeModal()">やめる</button></div>');
}

async function chooseItem(id) {
  closeModal();
  const it = ITEMS[id];
  if (it.effect === 'ball') { await throwBall(id); return; }
  /* 対象を選ぶ（onclick文字列でIDを渡せないのでグローバル変数経由） */
  window._pendingItem = id;
  const targets = G.party.map((m, i) => i).filter(i => S.hp[i] > 0);
  openModal('<h3>だれに つかう？</h3>' +
    targets.map(i => pickBtnHtml(i, 'useItemOn')).join('') +
    '<div class="modal-btns"><button class="btn" onclick="closeModal()">やめる</button></div>');
}

async function useItemOn(idx) {
  closeModal();
  const id = window._pendingItem;
  window._pendingItem = null;
  const msg = applyItemEffect(id, idx);
  if (!msg) { toast('いまは つかっても いみが なさそうだ'); playerTurnUI(); return; }
  takeItem(id);
  hideActions();
  renderBattle();
  await say(msg);
  await runTurn(null);  // アイテム使用で1ターン消費（敵が動く）
}

/* アイテム効果の適用（バトル・休けい共通）。無効ならnull */
function applyItemEffect(itemId, idx) {
  const it = ITEMS[itemId];
  const m = G.party[idx];
  const name = spec(m).name;
  if (it.effect === 'heal') {
    if (S.hp[idx] >= maxHp(m)) return null;
    S.hp[idx] = Math.min(maxHp(m), S.hp[idx] + it.amount);
    return name + 'の HPが かいふくした！';
  }
  if (it.effect === 'healfull') {
    if (S.hp[idx] >= maxHp(m)) return null;
    S.hp[idx] = maxHp(m);
    return name + 'の HPが ぜんかいふくした！';
  }
  if (it.effect === 'cure') {
    if (!S.st[idx]) return null;
    S.st[idx] = null;
    S.slp[idx] = 0;
    return name + 'の じょうたいいじょうが なおった！';
  }
  if (it.effect === 'pp') {
    const pp = S.pp[idx];
    let changed = false;
    spec(m).moves.forEach(mid => {
      if (pp[mid] < MOVES[mid].pp) { pp[mid] = Math.min(MOVES[mid].pp, pp[mid] + it.amount); changed = true; }
    });
    return changed ? name + 'の 技の PPが かいふくした！' : null;
  }
  return null;
}

/* ---- ボール ---- */
async function throwBall(itemId) {
  if (!B || B.over || B.kind !== 'wild') return;
  takeItem(itemId);
  hideActions();
  renderBattle();
  const gold = ITEMS[itemId].amount >= 2;
  await say((gold ? 'ゴールドボール' : 'モンスターボール') + 'を なげた！');

  const sp = spec(em());
  const rate = Math.min(0.95, CATCH_BASE[sp.rarity] * (gold ? 2 : 1) * (1 - (B.ehp / maxHp(em())) * 0.7));
  if (Math.random() < rate) {
    comment('catchOk');
    await say('やった！ ' + sp.name + 'を つかまえた！');
    markDex(em().sid, 2);
    const nm = newMon(em().sid, em().lv);
    if (G.party.length < PARTY_MAX) {
      G.party.push(nm);
      sessionPush(nm);
      await say(sp.name + 'は てもちに くわわった！');
    } else {
      G.box.push(nm);
      await say('てもちが いっぱいなので ' + sp.name + 'は ボックスに おくられた！');
    }
    B.over = true;
    saveGame();
    await afterWildBattle(false);  // 捕獲=そのバトル完了（ドロップなし）
  } else {
    comment('catchNg');
    await say('ああっ！ ' + sp.name + 'は ボールから でてしまった！');
    await runTurn(null);
  }
}

/* ---- にげる・こうたい ---- */
async function actRun() {
  if (!B || B.over || B.kind === 'boss') return;
  hideActions();
  B.over = true;
  await say('うまく にげきれた！');
  showRest(false);  // にげたバトルは戦数にカウントしない
}

function actSwitchUI() {
  if (!B || B.over) return;
  const others = G.party.map((m, i) => i).filter(i => i !== B.ai && S.hp[i] > 0);
  if (others.length === 0) { toast('ほかに たたかえる モンスターが いないよ！'); return; }
  openModal('<h3>だれと こうたいする？</h3>' + others.map(i => pickBtnHtml(i, 'pickSwitch')).join('') +
    '<div class="modal-btns"><button class="btn" onclick="closeModal()">やめる</button></div>');
}

function pickBtnHtml(i, fn) {
  const m = G.party[i], s = spec(m);
  return '<button class="pick" onclick="' + fn + '(' + i + ')">' +
    '<span class="pk-art">' + artHtml(s.id) + '</span>' + esc(s.name) + ailBadge(S.st[i]) +
    '<span class="pk-sub">Lv.' + m.lv + '　HP ' + Math.max(0, S.hp[i]) + '/' + maxHp(m) + '</span></button>';
}

async function pickSwitch(i) {
  closeModal();
  hideActions();
  B.ai = i;
  renderBattle();
  await say('ゆけっ！ ' + spec(pm()).name + '！');
  await runTurn(null);  // 交代はターン消費
}

/* ---- 決着処理 ---- */
async function onEnemyDown() {
  B.turnEnd = true;
  const gained = Math.floor(expGain(em()) * (B.kind === 'boss' ? 1.5 : 1));
  for (const t of gainExpMsgs(pm(), gained)) await say(t);
  /* 進化で技構成が変わったときのPP整備（あたらしい技は満タンで使える） */
  spec(pm()).moves.forEach(id => {
    if (S.pp[B.ai][id] === undefined) S.pp[B.ai][id] = MOVES[id].pp;
  });

  if (B.kind === 'wild') {
    B.over = true;
    saveGame();
    await afterWildBattle(true);
  } else if (B.ei < B.enemies.length - 1) {
    setEnemy(B.ei + 1);
    await say(B.trainer.name + 'は ' + spec(em()).name + 'を くりだした！');
  } else {
    await bossVictory();
  }
}

/* 野生バトル勝利/捕獲後: ドロップ→戦数カウント→休けい or 完走 */
async function afterWildBattle(rollForDrop) {
  if (rollForDrop) {
    const it = rollDrop();
    if (it) {
      const got = addItem(it.id, 1);
      await say(got > 0
        ? 'あいてが ' + it.name + 'を おとしていった！'
        : it.name + 'が おちていたが これいじょう もてない…');
    }
  }
  S.done++;
  saveGame();
  if (S.done >= S.total) await sessionComplete();
  else showRest(true);
}

function rollDrop() {
  let r = Math.random() * 100;
  for (const it of MASTER.items) { r -= it.drop; if (r < 0) return it; }
  return null;
}

/* ---- 休けい（連戦の合間）。アイテムはターン消費なしで使える ---- */
function showRest(fromWin) {
  const area = AREAS.find(a => a.id === S.areaId);
  const rows = G.party.map((m, i) => {
    const s = spec(m);
    const dead = S.hp[i] <= 0;
    return '<div class="rest-row' + (dead ? ' dead' : '') + '">' +
      '<span class="pk-art">' + artHtml(s.id) + '</span>' +
      '<span class="rest-name">' + esc(s.name) + ailBadge(S.st[i]) + '</span>' +
      '<span class="rest-hp">' + (dead ? 'ひんし' : 'HP ' + S.hp[i] + '/' + maxHp(m)) + '</span></div>';
  }).join('');
  openModal('<h3>🏕️ ちょっと 休けい</h3>' +
    '<p class="rest-note">' + esc(area.name) + '　' + S.done + ' / ' + S.total + ' せん クリア' +
    (fromWin ? '' : '（にげた ぶんは カウントされないよ）') + '</p>' +
    rows +
    '<div class="modal-btns">' +
    '<button class="btn primary" onclick="restNext()">つぎの たたかいへ！</button>' +
    '<button class="btn" onclick="restItemUI()">🎒 どうぐを つかう</button>' +
    '<button class="btn" onclick="restRetire()">🏠 リタイアして かえる</button>' +
    '</div>' +
    '<p class="retire-note">リタイアしても けいけんちや なかまは なくならないよ。<br>かえれば てもちの HPとPPは ぜんかいふく！<br>もらえないのは かんそうの ごほうびだけ！</p>', true);
}

async function restNext() {
  closeModal();
  if (firstAlive() < 0) { toast('たたかえる モンスターが いない！ どうぐで かいふくしよう'); showRest(true); return; }
  await nextExploreBattle();
}

function restItemUI() {
  const usable = MASTER.items.filter(it => itemCount(it.id) > 0 && it.effect !== 'ball');
  if (!usable.length) { toast('つかえる どうぐが ないよ！'); showRest(true); return; }
  openModal('<h3>🎒 どうぐを つかう（休けい中は ターンを つかわない）</h3>' +
    usable.map(it =>
      '<button class="pick" onclick="restChooseItem(\'' + it.id + '\')">' + esc(it.name) +
      '<span class="pk-sub">×' + itemCount(it.id) + '</span></button>').join('') +
    '<div class="modal-btns"><button class="btn" onclick="showRest(true)">もどる</button></div>', true);
}

function restChooseItem(id) {
  window._pendingItem = id;
  const targets = G.party.map((m, i) => i);
  openModal('<h3>だれに つかう？</h3>' +
    targets.map(i => pickBtnHtml(i, 'restUseOn')).join('') +
    '<div class="modal-btns"><button class="btn" onclick="restItemUI()">もどる</button></div>', true);
}

function restUseOn(idx) {
  const id = window._pendingItem;
  window._pendingItem = null;
  const msg = applyItemEffect(id, idx);
  if (!msg) { toast('いまは つかっても いみが なさそうだ'); restItemUI(); return; }
  takeItem(id);
  saveGame();
  toast(msg);
  restItemUI();
}

function restRetire() {
  closeModal();
  S = null;
  saveGame();
  toast('たんけんを きりあげて かえった（てもちは げんきに なったよ）');
  showScreen('map');
}

/* ---- 完走 ---- */
async function sessionComplete() {
  const area = AREAS.find(a => a.id === S.areaId);
  comment('sessionClear');
  const msg = area.reward.length ? grantRewards(area.reward) : '';
  saveGame();
  openModal('<h3>🎉 たんけん かんそう！</h3>' +
    '<p class="rest-note">' + esc(area.name) + 'の たんけんを やりきった！</p>' +
    (msg ? '<p class="reward-note">ほうしゅう： ' + esc(msg) + '</p>' : '') +
    '<div class="modal-btns"><button class="btn primary" onclick="sessionEnd()">マップへ もどる</button></div>', true);
}

function sessionEnd() {
  closeModal();
  S = null;
  showScreen('map');
}

/* ---- プレイヤー側ダウン・全滅 ---- */
async function onPlayerDown() {
  const alive = G.party.map((m, i) => i).filter(i => i !== B.ai && S.hp[i] > 0);
  if (alive.length === 0) {
    comment('wipe');
    await say('てもちの モンスターは みんな たおれてしまった…');
    await say('めのまえが まっくらに なった…！');
    if (B.kind === 'boss') await say('モンスターを そだてて また ちょうせんしよう！');
    else await say('けいけんちと つかまえた なかまは そのままだ。げんきを だして いこう！');
    B.over = true;
    S = null;  // 全滅=探検終了（報酬なし・手持ちは全回復して帰還）
    saveGame();
    showScreen('map');
    return;
  }
  await forceSwitchUI(alive);
  await say('ゆけっ！ ' + spec(pm()).name + '！');
  B.turnEnd = true;
}

function forceSwitchUI(alive) {
  return new Promise(resolve => {
    window._forceRes = resolve;
    openModal('<h3>つぎの モンスターを えらんでね</h3>' +
      alive.map(i => pickBtnHtml(i, 'pickForce')).join(''), true);
  });
}

function pickForce(i) {
  closeModal();
  B.ai = i;
  renderBattle();
  const r = window._forceRes;
  window._forceRes = null;
  if (r) r();
}

/* ---- ボス勝利・エンディング ---- */
async function bossVictory() {
  B.over = true;
  await say(B.trainer.name + 'との しょうぶに かった！');
  const firstClear = !G.cleared.includes(B.area.id);
  if (firstClear) G.cleared.push(B.area.id);

  if (!G.bossRewarded.includes(B.trainer.id) && B.trainer.reward.length) {
    G.bossRewarded.push(B.trainer.id);
    await say('しょうりの ごほうびだ！ ' + grantRewards(B.trainer.reward) + 'を てにいれた！');
  }
  saveGame();

  if (B.trainer.id === 'T8') {
    G.endingSeen = true;
    saveGame();
    S = null;
    showEnding();
  } else {
    await say(B.area.clearText);
    if (firstClear) await say('あたらしい エリアへの みちが ひらけた！');
    S = null;
    showScreen('map');
  }
}

function showEnding() {
  const a = AREAS.find(x => x.id === 'A8');
  const total = MASTER.monsters.length;
  document.getElementById('ending-body').innerHTML =
    '<div class="end-art">' + artHtml(48) + '</div><h2>ゲッショクを たおした！</h2>' +
    '<p>' + esc(a.clearText) + '</p>' +
    '<p>…はざまには まだ ゲッショクの 気配が 残っている。<br>たんけんで であえるかも…？</p>' +
    '<p>📖 ずかん：' + dexCaughtCount() + ' / ' + total + '<br>' +
    (dexCaughtCount() >= total ? '✨ ずかん コンプリート！ きみは でんせつの トレーナーだ！' :
      'ずかん ' + total + 'たい コンプリートに いどもう！') + '</p>' +
    '<button class="btn primary" onclick="showScreen(\'map\')">マップへ もどる</button>';
  showScreen('ending');
}
</script>

<script>
/* ========== 手持ち・ボックス画面（v2: 手持ち4体・2×2グリッド） ========== */

function renderParty() {
  let h = '<div class="page-header"><span class="page-title">🎒 てもち（' + G.party.length + '/' + PARTY_MAX + '）</span>' +
    '<button class="btn" onclick="openBag()" style="min-height:36px;font-size:13px">🎒 どうぐ</button></div>';

  h += '<div class="party-grid">' + G.party.map((m, i) => {
    const s = spec(m);
    const c = TYPE_COLOR[s.type];
    return '<div class="party-cell" onclick="partyDetail(' + i + ')">' +
      (i === 0 ? '<span class="lead-badge">せんとう</span>' : '') +
      '<div class="pc-art" style="border-color:' + c + ';background:' + c + '22">' + artHtml(s.id) + '</div>' +
      '<div class="pc-name">' + esc(s.name) + '</div>' +
      '<div class="pc-lv">Lv.' + m.lv + '　HP ' + maxHp(m) + '</div></div>';
  }).join('') + '</div>';
  h += '<p class="party-note">タップすると くわしい じょうほうが みられるよ</p>';

  h += '<div class="section-title">📦 ボックス（' + G.box.length + 'ひき）</div>';
  if (G.box.length === 0) {
    h += '<div class="empty-note">ボックスは からっぽ。<br>モンスターを つかまえよう！</div>';
  } else {
    h += '<div class="box-grid">' + G.box.map((m, i) => {
      const s = spec(m);
      const c = TYPE_COLOR[s.type];
      const btn = G.party.length < PARTY_MAX
        ? '<button class="btn primary" onclick="boxToParty(' + i + ')">てもちへ</button>'
        : '<button class="btn" onclick="swapUI(' + i + ')">いれかえ</button>';
      return '<div class="box-cell">' +
        '<div class="bc-art" style="border-color:' + c + ';background:' + c + '22">' + artHtml(s.id) + '</div>' +
        '<div class="bc-name">' + esc(s.name) + '</div>' +
        '<div class="bc-lv">Lv.' + m.lv + '</div>' + btn + '</div>';
    }).join('') + '</div>';
  }

  document.getElementById('party-body').innerHTML = h;
}

/* 技一覧（威力・命中・PPつき）。手持ち詳細と図鑑で共用 */
function movesTableHtml(moveIds) {
  return '<div class="mv-table">' + moveIds.map(id => {
    const mv = MOVES[id];
    const effect = mv.power > 0 ? 'いりょく ' + mv.power :
      (mv.ailment ? AIL_NAME[mv.ailment] + 'にする' : 'HPを半分かいふく');
    return '<div class="mv-row">' +
      '<span class="mv-chip" style="background:' + TYPE_COLOR[mv.type] + '">' + mv.type + '</span>' +
      '<span class="mvr-name">' + esc(mv.name) + '</span>' +
      '<span class="mvr-stats">' + effect + '　めいちゅう' + mv.acc + '　PP' + mv.pp + '</span></div>';
  }).join('') + '</div>';
}

function partyDetail(i) {
  const m = G.party[i], s = spec(m);
  const c = TYPE_COLOR[s.type];
  const btns = [];
  if (i > 0) btns.push('<button class="btn primary" onclick="partyToTop(' + i + ')">せんとうに する</button>');
  if (G.party.length > 1) btns.push('<button class="btn" onclick="partyToBox(' + i + ')">ボックスへ おくる</button>');
  btns.push('<button class="btn" onclick="closeModal()">とじる</button>');

  openModal('<div class="dexd">' + artHtml(s.id) +
    '<h3>' + esc(s.name) + '　<span style="color:#607089;font-size:13px">Lv.' + m.lv + '</span></h3>' +
    '<span class="type-chip" style="background:' + c + '">' + s.type + 'タイプ</span>' +
    '<div class="dd-stats">HP ' + maxHp(m) + '　こうげき ' + statOf(m, 'atk') +
    '　ぼうぎょ ' + statOf(m, 'def') + '　すばやさ ' + statOf(m, 'spd') +
    '<br>つぎのレベルまで あと' + Math.max(0, expNeed(m.lv) - m.exp) + '</div>' +
    movesTableHtml(s.moves) +
    '<div class="modal-btns">' + btns.join('') + '</div></div>');
}

function partyToTop(i) {
  closeModal();
  const m = G.party.splice(i, 1)[0];
  G.party.unshift(m);
  saveGame();
  renderParty();
}

function partyToBox(i) {
  closeModal();
  if (G.party.length <= 1) { toast('さいごの 1ぴきは ボックスに おくれないよ！'); return; }
  const m = G.party.splice(i, 1)[0];
  G.box.push(m);
  saveGame();
  renderParty();
}

function boxToParty(i) {
  if (G.party.length >= PARTY_MAX) { swapUI(i); return; }
  const m = G.box.splice(i, 1)[0];
  G.party.push(m);
  saveGame();
  renderParty();
}

function swapUI(boxIdx) {
  const bm = G.box[boxIdx];
  openModal('<h3>' + esc(spec(bm).name) + 'と だれを いれかえる？</h3>' +
    G.party.map((m, i) => {
      const s = spec(m);
      return '<button class="pick" onclick="doSwap(' + boxIdx + ',' + i + ')">' +
        '<span class="pk-art">' + artHtml(s.id) + '</span>' + esc(s.name) +
        '<span class="pk-sub">Lv.' + m.lv + '</span></button>';
    }).join('') +
    '<div class="modal-btns"><button class="btn" onclick="closeModal()">やめる</button></div>');
}

function doSwap(boxIdx, partyIdx) {
  closeModal();
  const tmp = G.box[boxIdx];
  G.box[boxIdx] = G.party[partyIdx];
  G.party[partyIdx] = tmp;
  saveGame();
  renderParty();
}
</script>

<script>
/* ========== 図鑑画面（v2: 48体・SVG・捕獲済みは技一覧も表示） ========== */

function renderDex() {
  const caught = dexCaughtCount();
  const total = MASTER.monsters.length;
  const pct = Math.floor(caught / total * 100);

  let h = '<div class="page-header"><span class="page-title">📖 モンスターずかん</span></div>';
  h += '<div class="comp-bar">コンプりつ：' + caught + ' / ' + total + '（' + pct + '%）' +
    (caught >= total ? '　🎉 コンプリート！' : '') + '</div>';

  h += '<div class="dex-grid">' + MASTER.monsters.map(m => {
    const st = dexState(m.id);
    const no = 'No.' + pad2(m.id);
    const name = st === 0 ? '？？？' : esc(m.name);
    return '<div class="dex-cell" onclick="dexDetail(' + m.id + ')">' +
      '<div class="dex-no">' + no + '</div>' +
      '<div class="dex-art">' + artHtml(m.id, st < 2 ? 'sil' : '') + '</div>' +
      '<div class="dex-name">' + name + '</div></div>';
  }).join('') + '</div>';

  document.getElementById('dex-body').innerHTML = h;
}

function dexDetail(id) {
  const m = MON[id];
  const st = dexState(id);
  const no = 'No.' + pad2(id);

  if (st === 0) {
    openModal('<div class="dexd">' + artHtml(id, 'sil') +
      '<h3>' + no + '　？？？</h3>' +
      '<div class="dd-desc">まだ みつけていない モンスター。<br>いろんな エリアを たんけんしてみよう！</div>' +
      '<div class="modal-btns"><button class="btn" onclick="closeModal()">とじる</button></div></div>');
    return;
  }

  if (st === 1) {
    openModal('<div class="dexd">' + artHtml(id, 'sil') +
      '<h3>' + no + '　' + esc(m.name) + '</h3>' +
      '<div class="dd-desc">であったことは あるけど まだ つかまえていない。<br>つかまえると くわしい じょうほうが わかるよ！</div>' +
      '<div class="modal-btns"><button class="btn" onclick="closeModal()">とじる</button></div></div>');
    return;
  }

  const c = TYPE_COLOR[m.type];
  const homes = m.spawns.map(sp => {
    const a = AREAS.find(x => x.id === sp.area);
    return a ? a.name : '？？？';
  });
  const stars = '★'.repeat(m.rarity) + '☆'.repeat(5 - m.rarity);
  openModal('<div class="dexd">' + artHtml(id) +
    '<h3>' + no + '　' + esc(m.name) + '</h3>' +
    '<span class="type-chip" style="background:' + c + '">' + m.type + 'タイプ</span>' +
    '<div class="dd-stats">レアど ' + stars + '<br>' +
    'HP ' + m.hp + '　こうげき ' + m.atk + '　ぼうぎょ ' + m.def + '　すばやさ ' + m.spd + '<br>' +
    'すみか：' + esc(homes.join('・') || '？？？') + '</div>' +
    '<div class="dd-desc">' + esc(m.desc) + '</div>' +
    movesTableHtml(m.moves) +
    '<div class="modal-btns"><button class="btn" onclick="closeModal()">とじる</button></div></div>');
}
</script>
